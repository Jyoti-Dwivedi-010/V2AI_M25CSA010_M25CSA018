apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: major-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: ghcr.io/YOUR_GITHUB_USERNAME/major-project-ui:latest
          imagePullPolicy: Always
          env:
            - name: API_BASE_URL
              value: http://api-service:8000
          ports:
            - containerPort: 8501
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 600m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: major-project
spec:
  selector:
    app: ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: LoadBalancer
