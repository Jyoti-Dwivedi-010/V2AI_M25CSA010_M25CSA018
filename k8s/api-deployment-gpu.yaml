apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gpu
  namespace: major-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gpu
  template:
    metadata:
      labels:
        app: api-gpu
    spec:
      containers:
        - name: api-gpu
          image: ghcr.io/YOUR_GITHUB_USERNAME/major-project-api-gpu:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: USE_GPU
              value: "true"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gpu-service
  namespace: major-project
spec:
  selector:
    app: api-gpu
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
