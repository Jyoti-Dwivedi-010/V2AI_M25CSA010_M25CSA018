global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "v2ai-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "v2ai-api-gpu"
    static_configs:
      - targets: ["api-gpu:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
