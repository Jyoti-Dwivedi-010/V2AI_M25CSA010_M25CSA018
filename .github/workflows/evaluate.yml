name: Evaluate RAG

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/app/services/**"
      - "src/app/experiments/**"
      - "data/evaluation/**"

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-eval-${{ hashFiles('requirements-ci.txt') }}

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run RAG evaluation (keyword coverage proxy only)
        env:
          PYTHONPATH: src
          MLFLOW_TRACKING_URI: ""
          WANDB_API_KEY: ""
        run: |
          echo "RAG evaluation triggered — full evaluation requires running API."
          echo "Run: python -m app.experiments.evaluate_rag"
          echo "After docker-compose up on the server."
